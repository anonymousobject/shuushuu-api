name: Claude PR Review

# DISABLED — Anthropic subscription paused. Automated review moved to
# .github/workflows/pr-agent.yml (Qodo PR-Agent via OpenRouter).
# To re-enable: restore the `on:` block below to
#   on:
#     pull_request:
#       types: [opened, synchronize]
# and ensure the CLAUDE_CODE_OAUTH_TOKEN secret is set. The job body below
# is intentionally left intact so nothing is lost.
on:
  workflow_dispatch: {}

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: "Review this pull request for code quality, correctness, and security. Follow the project conventions in AGENTS.md. Leave inline comments for concrete issues; skip nitpicks."
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

# Production override — containerised nginx + certbot as TLS edge
# Docker provides: api, arq-worker, frontend, nginx, certbot, mediawiki, meilisearch, iqdb, loki, grafana, alloy, docker-socket-proxy
# DB tier (native, out-of-stack): mariadb + redis reached over private network; containers are busybox stubs
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # Disable local services not needed in production
  # Use entrypoint override instead of profiles to keep services "defined"
  # (profiles makes them undefined, breaking depends_on merge from base)
  mariadb:
    image: busybox:latest
    entrypoint: ["sleep", "infinity"]
    restart: "no"
    # Drop the base service's 3306 host publish — production MariaDB
    # lives natively on a separate DB tier reached over a private
    # network. The stub exists purely to keep depends_on chains
    # merging cleanly.
    ports: !override []
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 1

  adminer:
    profiles: [disabled]

  redis-commander:
    profiles: [disabled]

  # In production, Redis runs as a native service on the DB tier rather
  # than as a container on the app host. Stub the service the same way
  # mariadb is stubbed so depends_on chains keep merging cleanly without
  # actually running a redis container.
  redis:
    image: busybox:latest
    entrypoint: ["sleep", "infinity"]
    restart: "no"
    # Same as mariadb — Redis is native on the DB tier. Stub keeps
    # depends_on merging; no need to publish 6379 on the host.
    ports: !override []
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 1

  # Meilisearch runs as an actual container in prod (unlike redis/mariadb),
  # but only api/arq-worker should reach it over the compose default
  # network. Drop the base service's 7700 host publish so it isn't
  # accessible from outside the container network.
  meilisearch:
    ports: !override []

  frontend:
    # NOTE: Expects shuushuu-frontend repo at ../shuushuu-frontend (sibling directory)
    build:
      context: ../shuushuu-frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_ENVIRONMENT=production
        - PUBLIC_API_URL=http://api:8000
        - PUBLIC_DEBUG=false
        - PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
    container_name: shuushuu-frontend-prod
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      - PUBLIC_ENVIRONMENT=production
      - PUBLIC_API_URL=http://api:8000
      - STORAGE_PATH=${STORAGE_PATH}
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - default
    logging: *default-logging

  nginx:
    container_name: shuushuu-nginx-prod
    environment:
      - STORAGE_PATH=${STORAGE_PATH:-/shuushuu/images}
      - NGINX_HOST=${NGINX_HOST:?NGINX_HOST must be set in .env.prod}
    volumes: !override
      # Read-only image storage for nginx's static-file locations.
      - ${STORAGE_PATH:-/shuushuu/images}:${STORAGE_PATH:-/shuushuu/images}:ro
      # Base nginx.conf and prod-specific site template (envsubst'd at
      # entrypoint into /etc/nginx/conf.d/default.conf).
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/frontend-production.conf.template:/etc/nginx/conf.d/frontend.conf.template:ro
      # Auto-included at http level via /etc/nginx/conf.d/*.conf.
      # Maps CF-Connecting-IP -> $remote_addr for traffic from CF edges.
      - ./docker/nginx/cloudflare-real-ip.conf:/etc/nginx/conf.d/cloudflare-real-ip.conf:ro
      - ./docker/nginx/.htpasswd.example:/etc/nginx/.htpasswd:ro
      # Mediawiki vhost — tracked in the repo (not ansible-rendered).
      # Hostname is hardcoded (wiki.e-shuushuu.net) because the wiki
      # only runs in prod and its public URL is fixed. The .conf glob
      # in nginx.conf picks it up automatically.
      - ./docker/nginx/conf.d/wiki.conf:/etc/nginx/conf.d/wiki.conf:ro
      # LE certs land here via the certbot service. Read-only for nginx;
      # certbot has it RW.
      - ./docker/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
      # wiki.conf proxies to the mediawiki container. Docker DNS
      # resolves the name regardless, but without this nginx can accept
      # wiki traffic before php-fpm is ready and return a transient 502
      # on a fresh `compose up`.
      - mediawiki
    restart: unless-stopped
    logging: *default-logging

  mediawiki:
    image: mediawiki:1.45
    container_name: shuushuu-mediawiki-prod
    ports: !override []   # nginx fronts it; no host port
    volumes:
      # Rendered by ansible (compose_project role) with vault secrets
      # + the host's configured wiki hostname.
      - ./mediawiki/LocalSettings.php:/var/www/html/LocalSettings.php:ro
      # Wiki uploads volume — populated by the IaC layer.
      - mediawiki-images:/var/www/html/images
    restart: unless-stopped
    logging: *default-logging

  api:
    container_name: shuushuu-api-prod
    user: "1003:1003"  # shuushuu user — matches storage directory ownership
    command: uv run --no-project uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: !override
      - "127.0.0.1:8000:8000"
    # !override replaces (rather than merges with) the base service's
    # env_file list; without it, compose tries to load both .env and
    # .env.prod and errors out when the dev-only .env is absent.
    env_file: !override
      - .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ARQ_REDIS_URL=${ARQ_REDIS_URL}
      - IQDB_HOST=iqdb
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${STORAGE_PATH:-/shuushuu/images}:${STORAGE_PATH:-/shuushuu/images}
    # List form replaces base depends_on entirely (removes mariadb dependency)
    depends_on:
      - redis
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  arq-worker:
    container_name: shuushuu-arq-worker-prod
    user: "1003:1003"  # shuushuu user — matches storage directory ownership
    ports: []
    # !override replaces (rather than merges with) the base service's
    # env_file list; without it, compose tries to load both .env and
    # .env.prod and errors out when the dev-only .env is absent.
    env_file: !override
      - .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ARQ_REDIS_URL=${ARQ_REDIS_URL}
      - IQDB_HOST=iqdb
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${STORAGE_PATH:-/shuushuu/images}:${STORAGE_PATH:-/shuushuu/images}
    # List form replaces base depends_on entirely (removes mariadb dependency)
    depends_on:
      - redis
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  iqdb:
    container_name: shuushuu-iqdb-prod
    ports: !override []  # Internal only in production
    logging: *default-logging

  loki:
    image: grafana/loki:3.3.2
    container_name: shuushuu-loki-prod
    user: "10001:10001"  # Loki's default uid; must match volume ownership
    command: -config.file=/etc/loki/loki-config.yaml
    ports: !override []  # Internal only
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Isolate Loki from the app network. Loki runs `auth_enabled: false` and
    # exposes an admin delete API; if a compromised api/arq-worker container
    # could reach it, an attacker could scrub log history to cover their tracks
    # before incident response notices. Only alloy (writer) and grafana (reader)
    # need to talk to Loki.
    networks:
      - logging-net
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.4.0
    container_name: shuushuu-grafana-prod
    ports: !override
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    # No env_file: .env.prod — only GRAFANA_ADMIN_PASSWORD is needed, and it is
    # already substituted via ${VAR} in `environment:` (sourced from --env-file at compose level).
    # This avoids leaking unrelated DB/Redis/etc. credentials into the Grafana container.
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Grafana only needs to reach Loki, and is exposed to operators via the host
    # port mapping (127.0.0.1:3001). Keep it off the app network.
    networks:
      - logging-net
    logging: *default-logging

  # Brokers Docker Engine API access for alloy. Runs with userns_mode: host so
  # it can read the real /var/run/docker.sock (which is root:docker on the
  # host); under userns-remap, container UIDs/GIDs are translated and a
  # remapped container can't be granted host docker-group membership directly.
  # The proxy is the *only* component with host-level docker access — alloy
  # itself stays under userns-remap and reaches the API only via TCP on an
  # isolated network. Allowlist is CONTAINERS=1 + NETWORKS=1 only — both
  # read-only inspect endpoints; no exec/create/volumes/auth/etc.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: shuushuu-docker-socket-proxy-prod
    userns_mode: "host"
    group_add:
      # Host docker GID, rendered into .env.prod by ansible (gathered via
      # `getent group docker` on the host). Required because under
      # userns_mode: host the in-container gid must match the real host gid.
      - "${DOCKER_GID:?DOCKER_GID must be set in .env.prod}"
    environment:
      # CONTAINERS — list/inspect containers (alloy's discovery.docker)
      # NETWORKS  — GET /networks/<id>; alloy enriches container targets
      #             with __meta_docker_network_* labels and 403s without it.
      # Both are read-only API surfaces in the proxy's allowlist.
      CONTAINERS: 1
      NETWORKS: 1
      # Suppress per-request haproxy access lines. Alloy polls every 10s
      # and queries /containers/json + per-container inspects + /networks/<id>,
      # which would otherwise flood Loki with self-referential noise.
      # Real warnings/errors are still emitted.
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No read_only filesystem: the image's entrypoint regenerates its
    # haproxy config in /usr/local/etc/haproxy at boot from env vars, and
    # tmpfs there shadows the haproxy.cfg.template that ships in the image.
    # The container has no persistent mounts beyond the read-only docker
    # socket, so its writable layer is ephemeral; the trust boundary is the
    # CONTAINERS=1 + NETWORKS=1 allowlist and the internal-only socket-proxy-net.
    ports: []  # No host port; only reachable on socket-proxy-net
    networks:
      - socket-proxy-net
    restart: unless-stopped
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: shuushuu-alloy-prod
    # Alloy runs as its image-default user (uid 473) and stays under the
    # daemon's userns-remap. It does NOT have host docker.sock access; it
    # talks to docker-socket-proxy over TCP on socket-proxy-net.
    user: "473:473"
    # No group_add for adm: under the daemon's userns-remap, container
    # gids are translated to host gids that aren't `adm`, so any
    # group_add here is a no-op for reading host /var/log/nginx (mode
    # 640 www-data:adm). When nginx log ingestion is wired up later
    # we'll do it through the socket proxy, not a bind mount, which
    # sidesteps the gid problem entirely.
    environment:
      - TZ=${TZ:-UTC}
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data
      /etc/alloy/config.alloy
    ports: !override []  # Internal only
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log/nginx:/var/log/nginx:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    # No healthcheck: grafana/alloy ships without wget/curl/nc, so the standard
    # HTTP probe pattern doesn't work. Alloy is a leaf service — nothing depends
    # on its `service_healthy` status — and `restart: unless-stopped` plus
    # docker's process supervision are sufficient.
    restart: unless-stopped
    networks:
      - logging-net
      - socket-proxy-net
    logging: *default-logging

  # certbot/dns-cloudflare ships with the dns-cloudflare plugin pre-installed.
  # DNS-01 challenge means we don't need port 80 reachable from LE — certbot
  # writes a TXT record via the CF API, LE polls DNS, certbot removes it.
  #
  # Steady state: this service loops `certbot renew` every 12h (DNS-01 every
  # time, no webroot needed). The entrypoint override is just for the loop;
  # for one-shot operations override entrypoint per-invocation.
  #
  # Initial issuance (run once, before `docker compose up`):
  # nginx.conf unconditionally includes wiki.conf, which references
  # /etc/letsencrypt/live/wiki.e-shuushuu.net/… — nginx -t fails and the
  # container won't start until both certs exist. Issue them first:
  #
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
  #       --env-file ../.env.prod run --rm --entrypoint certbot certbot \
  #       certonly --non-interactive --agree-tos \
  #       --email <your-email> \
  #       --dns-cloudflare \
  #       --dns-cloudflare-credentials /run/secrets/cloudflare.ini \
  #       --dns-cloudflare-propagation-seconds 30 \
  #       -d $NGINX_HOST
  #
  # Then issue (or add as a SAN in a second invocation) the wiki cert:
  #   … certonly … -d wiki.e-shuushuu.net
  certbot:
    image: certbot/dns-cloudflare:v3.0.0
    container_name: shuushuu-certbot-prod
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      # cloudflare.ini is rendered by ansible (compose_project role) at
      # ./secrets/cloudflare.ini with mode 0600. The bind preserves mode,
      # which certbot requires (refuses to read the file otherwise).
      - ./secrets/cloudflare.ini:/run/secrets/cloudflare.ini:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap exit TERM
        while :; do
          # Drop --quiet so renewal errors hit stderr → container logs → Loki.
          # `|| echo` keeps the loop alive on transient failures while still
          # surfacing them; without it a silent --quiet || true could mask
          # a broken CF token or DNS issue until the cert literally expires.
          certbot renew \
            --dns-cloudflare \
            --dns-cloudflare-credentials /run/secrets/cloudflare.ini \
            --dns-cloudflare-propagation-seconds 30 \
            || echo "certbot renew FAILED at $(date -u +%FT%TZ)" >&2
          sleep 12h & wait $${!}
        done
    restart: unless-stopped
    logging: *default-logging

volumes:
  # Override generic volume names with prod-specific names for data isolation
  mariadb_data:
    name: mariadb_data_prod
    driver: local
  redis_data:
    name: redis_data_prod
    driver: local
  iqdb_data:
    name: iqdb_data_prod
    driver: local
  loki_data:
    name: loki_data_prod
    driver: local
  grafana_data:
    name: grafana_data_prod
    driver: local
  mediawiki-images:
    name: mediawiki_images_prod
    driver: local
  alloy_data:
    name: alloy_data_prod
    driver: local

networks:
  logging-net:
    name: shuushuu-logging-net-prod
    driver: bridge
  # Carries only alloy ↔ docker-socket-proxy traffic. Internal so nothing
  # outside this network can reach the proxy (which would otherwise be a
  # docker-API gateway from the broader compose project).
  socket-proxy-net:
    name: shuushuu-socket-proxy-net-prod
    driver: bridge
    internal: true

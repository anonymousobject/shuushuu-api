# Production override — host nginx as edge proxy
# Docker provides: api, frontend, arq-worker, redis, iqdb
# Host provides: nginx (SSL, wiki/forums), certbot, PHP-FPM
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # Disable local services not needed in production
  # Use entrypoint override instead of profiles to keep services "defined"
  # (profiles makes them undefined, breaking depends_on merge from base)
  mariadb:
    image: busybox:latest
    entrypoint: ["sleep", "infinity"]
    restart: "no"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      retries: 1

  adminer:
    profiles: [disabled]

  redis-commander:
    profiles: [disabled]

  redis:
    container_name: shuushuu-redis-prod
    ports: !override []  # Internal only in production
    logging: *default-logging

  frontend:
    # NOTE: Expects shuushuu-frontend repo at ../shuushuu-frontend (sibling directory)
    build:
      context: ../shuushuu-frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_ENVIRONMENT=production
        - PUBLIC_API_URL=http://api:8000
        - PUBLIC_DEBUG=false
        - PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
    container_name: shuushuu-frontend-prod
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      - PUBLIC_ENVIRONMENT=production
      - PUBLIC_API_URL=http://api:8000
      - STORAGE_PATH=${STORAGE_PATH}
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - default
    logging: *default-logging

  nginx:
    profiles: [disabled]

  api:
    container_name: shuushuu-api-prod
    user: "1003:1003"  # shuushuu user — matches storage directory ownership
    command: uv run --no-project uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: !override
      - "127.0.0.1:8000:8000"
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - ARQ_REDIS_URL=redis://redis:6379/1
      - IQDB_HOST=iqdb
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${STORAGE_PATH:-/shuushuu/images}:${STORAGE_PATH:-/shuushuu/images}
    # List form replaces base depends_on entirely (removes mariadb dependency)
    depends_on:
      - redis
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "fern:10.0.0.62"
    logging: *default-logging

  arq-worker:
    container_name: shuushuu-arq-worker-prod
    user: "1003:1003"  # shuushuu user — matches storage directory ownership
    ports: []
    env_file: .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - ARQ_REDIS_URL=redis://redis:6379/1
      - IQDB_HOST=iqdb
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ${STORAGE_PATH:-/shuushuu/images}:${STORAGE_PATH:-/shuushuu/images}
    # List form replaces base depends_on entirely (removes mariadb dependency)
    depends_on:
      - redis
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "fern:10.0.0.62"
    logging: *default-logging

  iqdb:
    container_name: shuushuu-iqdb-prod
    ports: !override []  # Internal only in production
    logging: *default-logging

  loki:
    image: grafana/loki:3.3.2
    container_name: shuushuu-loki-prod
    user: "10001:10001"  # Loki's default uid; must match volume ownership
    command: -config.file=/etc/loki/loki-config.yaml
    ports: !override []  # Internal only
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.4.0
    container_name: shuushuu-grafana-prod
    ports: !override
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
    # No env_file: .env.prod — only GRAFANA_ADMIN_PASSWORD is needed, and it is
    # already substituted via ${VAR} in `environment:` (sourced from --env-file at compose level).
    # This avoids leaking unrelated DB/Redis/etc. credentials into the Grafana container.
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: shuushuu-alloy-prod
    # Alloy's image default user is uid 473 (`alloy`); /var/lib/alloy/data is owned by 473.
    # We keep that uid and use group_add for the supplementary groups Alloy needs:
    #   docker — to read /var/run/docker.sock (gid varies; check with getent on prod)
    #   adm    — to read /var/log/nginx/* (added in Chunk 4)
    #
    # SECURITY NOTE: membership in the host `docker` group grants effective root
    # via the socket. The threat model treats Alloy as a trusted in-cluster agent
    # (same posture as cAdvisor, Watchtower). See logging design doc, "Security
    # considerations".
    user: "473:473"
    group_add:
      # WARNING: gids vary per host. Wrong docker gid → no container logs flow;
      # wrong adm gid → no host nginx logs flow. Both fail silently (Alloy stays
      # healthy). Verify on prod before deploying:
      #   getent group docker | cut -d: -f3   # commonly 999 on Debian/Ubuntu
      #   getent group adm    | cut -d: -f3   # commonly 4 on Debian/Ubuntu
      - "999"  # docker
      - "4"    # adm — needed to read /var/log/nginx/* (mode 640 www-data:adm)
    command: >
      run
      --server.http.listen-addr=0.0.0.0:12345
      --storage.path=/var/lib/alloy/data
      /etc/alloy/config.alloy
    ports: !override []  # Internal only
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/nginx:/var/log/nginx:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    # No healthcheck: grafana/alloy ships without wget/curl/nc, so the standard
    # HTTP probe pattern doesn't work. Alloy is a leaf service — nothing depends
    # on its `service_healthy` status — and `restart: unless-stopped` plus
    # docker's process supervision are sufficient. If a future service ever
    # needs to wait for Alloy, swap to a bash /dev/tcp probe.
    restart: unless-stopped
    logging: *default-logging

  certbot:
    profiles: [disabled]

volumes:
  # Override generic volume names with prod-specific names for data isolation
  mariadb_data:
    name: mariadb_data_prod
    driver: local
  redis_data:
    name: redis_data_prod
    driver: local
  iqdb_data:
    name: iqdb_data_prod
    driver: local
  loki_data:
    name: loki_data_prod
    driver: local
  grafana_data:
    name: grafana_data_prod
    driver: local
  alloy_data:
    name: alloy_data_prod
    driver: local

# Stub. The real vhost is rendered by the IaC layer's compose_project
# role when the host's wiki hostname variable is set; ansible overwrites
# this file in place.
#
# Tracked in the repo so docker's bind mount in docker-compose.prod.yml
# (`./docker/nginx/conf.d/wiki.conf`) finds a regular file on a fresh
# checkout. Without the stub, docker would auto-create a *directory* at
# the source path, and nginx's `include /etc/nginx/conf.d/*.conf;` would
# then try to include a directory and refuse to start.

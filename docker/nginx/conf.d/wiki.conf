# Mediawiki vhost for wiki.e-shuushuu.net.
#
# Auto-included via nginx.conf's `include /etc/nginx/conf.d/*.conf;`.
# Hostname is hardcoded because the wiki only runs in production and
# its public URL is fixed; no templating needed.
server {
    listen 80;
    listen [::]:80;
    server_name wiki.e-shuushuu.net;
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wiki.e-shuushuu.net;

    ssl_certificate     /etc/letsencrypt/live/wiki.e-shuushuu.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.e-shuushuu.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Mediawiki uploads + file embeds can be sizeable. Bump generously.
    client_max_body_size 64M;

    location / {
        proxy_pass http://mediawiki/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
    }
}
